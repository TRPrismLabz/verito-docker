services:
  verito:
    image: ghcr.io/prismlabz/verito:latest
    # Or build from local core repo:
    # build: ../verito-core
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file: .env
    volumes:
      - verito_data:/app/data
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  verito_data:
  redis_data:
